<!DOCTYPE html>
<html>
<head>

<!-- T칤tulo de la p치gina -->
<div class="header" 
{% if entidad == "dos_agosto" %}
style="background:#2C2C2C; color:white;"
{% else %}
style="background:#F4C542; color:#1a1a1a;"
{% endif %}
>
{% if entidad == "dos_agosto" %}
Mutual 2 de Agosto - Completar Datero
{% else %}
AMAT - Completar Datero
{% endif %}
</div>

<!-- Configuraci칩n responsive para celulares -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fuente Inter desde Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Transici칩n suave en todos los elementos */
* { transition: all 0.2s ease; }

/* Estilo general del body */
body {
    font-family: 'Inter', Arial;
    background: #f5f6fa;
    margin: 0;
}

/* Header superior */
.header {
    padding: 16px;
    text-align: center;
    font-weight: 600;
    border-radius: 10px;
    margin: 20px auto;
    max-width: 650px;
}

/* Contenedor principal */
.container {
    max-width: 650px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.08);
}

/* T칤tulo principal */
h2 {
    text-align: center;
}

/* Subt칤tulos de secciones */
h3 {
    margin-top: 25px;
    font-size: 14px;
    border-left: 4px solid #F4C542; /* AMAT */
    padding-left: 8px;
}

body.dark h3 {
    border-left: 4px solid #2C2C2C; /* 2 de Agosto */
    color: #000000;        /* texto negro */
    font-weight: bold;  /* 游댠 negrita */
}

/* Inputs del formulario */
input {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
    box-sizing: border-box; /* 游댠 arregla el desborde */
}

/* Bot칩n principal */
button {
    width: 100%;
    padding: 16px;
    background: #1a1a1a;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 16px;
}

button:hover {
    background: #333;
}

</style>
</head>

<body class="{% if entidad == 'dos_agosto' %}dark{% endif %}">

<!-- Header -->
<div class="header" 
{% if entidad == "dos_agosto" %}
style="background:#2C2C2C; color:white;"
{% else %}
style="background:#FFD600;"
{% endif %}
>

<!-- Contenedor principal -->
<div class="container">

<!-- T칤tulo -->
<h2>Datos del Cliente</h2>


<!-- Formulario que env칤a datos a /guardar -->
<form action="/guardar" method="post">

<!-- Secci칩n datos personales -->
<h3>Datos Personales</h3>

<input name="nombre" placeholder="Apellido y Nombre"
pattern="[A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]+"
oninput="this.value = this.value.replace(/[^A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]/g, '')"
required>

<input name="dni" placeholder="DNI"
pattern="\d+" inputmode="numeric"
oninput="this.value = this.value.replace(/[^0-9]/g, '')"
required>

<input name="nacionalidad" placeholder="Nacionalidad"
pattern="[A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]+"
oninput="this.value = this.value.replace(/[^A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]/g, '')">

<!-- Fecha de nacimiento -->
<input type="text" name="fecha_nacimiento" placeholder="Fecha de nacimiento" onfocus="this.type='date'">

<input name="domicilio" placeholder="Domicilio">

<input name="localidad" placeholder="Localidad"
pattern="[A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]+"
oninput="this.value = this.value.replace(/[^A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]/g, '')">

<input name="cp" placeholder="C칩digo Postal"
pattern="\d+" inputmode="numeric"
oninput="this.value = this.value.replace(/[^0-9]/g, '')">

<input name="cuit" placeholder="CUIT"
pattern="\d+" inputmode="numeric"
oninput="this.value = this.value.replace(/[^0-9]/g, '')">

<input name="provincia" placeholder="Provincia"
pattern="[A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]+"
oninput="this.value = this.value.replace(/[^A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]/g, '')">

<input name="celular" placeholder="Tel칠fono"
pattern="\d+" inputmode="numeric"
oninput="this.value = this.value.replace(/[^0-9]/g, '')">

<input type="email" name="email" placeholder="Email">

<input name="cbu" placeholder="CBU"
pattern="\d+" inputmode="numeric"
oninput="this.value = this.value.replace(/[^0-9]/g, '')">


<!-- Referencia 1 -->
<h3>Referencia 1</h3>

<input name="ref1_parentesco" placeholder="Parentesco"
pattern="[A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]+"
oninput="this.value = this.value.replace(/[^A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]/g, '')">

<input name="ref1_nombre" placeholder="Nombre"
pattern="[A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]+"
oninput="this.value = this.value.replace(/[^A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]/g, '')">

<input name="ref1_tel" placeholder="Tel칠fono"
pattern="\d+" inputmode="numeric"
oninput="this.value = this.value.replace(/[^0-9]/g, '')">


<!-- Referencia 2 -->
<h3>Referencia 2</h3>

<input name="ref2_parentesco" placeholder="Parentesco"
pattern="[A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]+"
oninput="this.value = this.value.replace(/[^A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]/g, '')">

<input name="ref2_nombre" placeholder="Nombre"
pattern="[A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]+"
oninput="this.value = this.value.replace(/[^A-Za-z츼칄칈칍칔치칠칤칩칰침칌\s]/g, '')">

<input name="ref2_tel" placeholder="Tel칠fono"
pattern="\d+" inputmode="numeric"
oninput="this.value = this.value.replace(/[^0-9]/g, '')">

<!-- Datos ocultos que vienen desde el c치lculo -->
 <input type="hidden" name="entidad" value="{{ entidad }}">
<input type="hidden" name="reparticion" value="{{ reparticion }}">
<input type="hidden" name="monto" value="{{ monto }}">
<input type="hidden" name="cuotas" value="{{ cuotas }}">
<input type="hidden" name="valor_cuota" value="{{ valor_cuota }}">
<input type="hidden" name="cuota_social" value="{{ cuota_social }}">
<input type="hidden" name="medico" value="{{ medico }}">
<input type="hidden" name="farmacia" value="{{ farmacia }}">

<!-- Bot칩n para generar el PDF -->
<button type="submit">Generar Datero PDF</button>

</form>

</div>

<script>
const form = document.querySelector("form");

form.addEventListener("submit", function(e) {
    e.preventDefault(); // 游댠 evita que descargue el PDF

    const formData = new FormData(form);

    fetch("/guardar", {
        method: "POST",
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        console.log(data);

        // 游댠 REDIRECCI칍N A FIRMA
        window.location.href = data.link_firma;
    })
    .catch(error => {
        alert("Error al generar documento");
        console.error(error);
    });
});
</script>

</body>
</html>
