<!DOCTYPE html>
<html>
<head>

<!-- Título de la página -->
<div class="header" 
{% if entidad == "dos_agosto" %}
style="background:#2C2C2C; color:white;"
{% else %}
style="background:#F4C542; color:#1a1a1a;"
{% endif %}
>
{% if entidad == "dos_agosto" %}
Mutual 2 de Agosto - Completar Datero
{% else %}
AMAT - Completar Datero
{% endif %}
</div>

<!-- Configuración responsive para celulares -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fuente Inter desde Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Transición suave en todos los elementos */
* { transition: all 0.2s ease; }

/* Estilo general del body */
body {
    font-family: 'Inter', Arial;
    background: #f5f6fa;
    margin: 0;
}

/* Header superior */
.header {
    padding: 16px;
    text-align: center;
    font-weight: 600;
    border-radius: 10px;
    margin: 20px auto;
    max-width: 650px;
}

/* Contenedor principal */
.container {
    max-width: 650px;
    margin: 30px auto;
    background: white;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.08);
}

/* Título principal */
h2 {
    text-align: center;
}

/* Subtítulos de secciones */
h3 {
    margin-top: 25px;
    font-size: 14px;
    border-left: 4px solid #F4C542; /* AMAT */
    padding-left: 8px;
}

body.dark h3 {
    border-left: 4px solid #2C2C2C; /* 2 de Agosto */
    color: #000000;        /* texto negro */
    font-weight: bold;  /* 🔥 negrita */
}

/* Inputs del formulario */
input {
    width: 100%;
    padding: 14px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
    box-sizing: border-box; /* 🔥 arregla el desborde */
}

/* Botón principal */
button {
    width: 100%;
    padding: 16px;
    background: #1a1a1a;
    color: white;
    border: none;
    border-radius: 10px;
    font-weight: 600;
    font-size: 16px;
}

button:hover {
    background: #333;
}

</style>
</head>

<body class="{% if entidad == 'dos_agosto' %}dark{% endif %}">

<!-- Header -->
<div class="header" 
{% if entidad == "dos_agosto" %}
style="background:#2C2C2C; color:white;"
{% else %}
style="background:#FFD600;"
{% endif %}
>

<!-- Contenedor principal -->
<div class="container">

<!-- Título -->
<h2>Datos del Cliente</h2>


<!-- Formulario que envía datos a /guardar -->
<form action="/guardar" method="post">

<!-- Sección datos personales -->
<h3>Datos Personales</h3>

<input name="nombre" placeholder="Nombre completo"
pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+"
oninput="this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ\s]/g, '')"
required>

<input name="dni" placeholder="DNI"
pattern="\d+" inputmode="numeric"
oninput="this.value = this.value.replace(/[^0-9]/g, '')"
required>

<input name="nacionalidad" placeholder="Nacionalidad"
pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+"
oninput="this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ\s]/g, '')">

<input name="domicilio" placeholder="Domicilio">

<input name="localidad" placeholder="Localidad"
pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+"
oninput="this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ\s]/g, '')">

<input name="cp" placeholder="Código Postal"
pattern="\d+" inputmode="numeric"
oninput="this.value = this.value.replace(/[^0-9]/g, '')">

<input name="cuit" placeholder="CUIT"
pattern="\d+" inputmode="numeric"
oninput="this.value = this.value.replace(/[^0-9]/g, '')">

<input name="provincia" placeholder="Provincia"
pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+"
oninput="this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ\s]/g, '')">

<input name="celular" placeholder="Teléfono"
pattern="\d+" inputmode="numeric"
oninput="this.value = this.value.replace(/[^0-9]/g, '')">

<input type="email" name="email" placeholder="Email">


<!-- Fecha de nacimiento -->
<input type="text" name="fecha_nacimiento" placeholder="Fecha de nacimiento" onfocus="this.type='date'">

<!-- Sección datos bancarios -->
<h3>Datos Bancarios</h3>

<input name="cbu" placeholder="CBU"
pattern="\d+" inputmode="numeric"
oninput="this.value = this.value.replace(/[^0-9]/g, '')">


<!-- Sección datos laborales -->
<h3>Datos Laborales</h3>

<input name="loc_laboral" placeholder="Localidad Laboral"
pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+"
oninput="this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ\s]/g, '')">


<!-- Referencia 1 -->
<h3>Referencia 1</h3>

<input name="ref1_parentesco" placeholder="Parentesco"
pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+"
oninput="this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ\s]/g, '')">

<input name="ref1_nombre" placeholder="Nombre"
pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+"
oninput="this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ\s]/g, '')">

<input name="ref1_tel" placeholder="Teléfono"
pattern="\d+" inputmode="numeric"
oninput="this.value = this.value.replace(/[^0-9]/g, '')">


<!-- Referencia 2 -->
<h3>Referencia 2</h3>

<input name="ref2_parentesco" placeholder="Parentesco"
pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+"
oninput="this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ\s]/g, '')">

<input name="ref2_nombre" placeholder="Nombre"
pattern="[A-Za-zÁÉÍÓÚáéíóúñÑ\s]+"
oninput="this.value = this.value.replace(/[^A-Za-zÁÉÍÓÚáéíóúñÑ\s]/g, '')">

<input name="ref2_tel" placeholder="Teléfono"
pattern="\d+" inputmode="numeric"
oninput="this.value = this.value.replace(/[^0-9]/g, '')">

<!-- Datos ocultos que vienen desde el cálculo -->
 <input type="hidden" name="entidad" value="{{ entidad }}">
<input type="hidden" name="reparticion" value="{{ reparticion }}">
<input type="hidden" name="monto" value="{{ monto }}">
<input type="hidden" name="cuotas" value="{{ cuotas }}">
<input type="hidden" name="valor_cuota" value="{{ valor_cuota }}">
<input type="hidden" name="cuota_social" value="{{ cuota_social }}">
<input type="hidden" name="medico" value="{{ medico }}">
<input type="hidden" name="farmacia" value="{{ farmacia }}">

<!-- Botón para generar el PDF -->
<button type="submit">Generar Datero PDF</button>

</form>

</div>

</body>
</html>
