<!DOCTYPE html>
<html>
<head>
<title>AMAT - Simulador</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* { transition: all 0.2s ease; }

body {
    font-family: 'Inter', sans-serif;
    background: #f5f6fa;
    margin: 0;
}

.header {
    background: #FFD600;
    padding: 16px;
    text-align: center;
    font-weight: 600;
    font-size: 18px;
}

.container {
    max-width: 500px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.08);
}

h2 {
    margin-bottom: 20px;
    text-align: center;
}

label {
    font-weight: 600;
    font-size: 14px;
}

select {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    margin-bottom: 18px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 16px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: white;
    font-weight: 600;
    font-size: 16px;
}

button:hover {
    background: #333;
    transform: scale(1.02);
}
</style>
</head>

<body>

<div class="header">AMAT - Mutual Amarilla</div>

<div class="container">

<h2>Simular Oferta</h2>

<form action="/calcular" method="post">

<label>Repartición</label>
<select name="reparticion">
<option value="policia">Policía</option>
<option value="educacion">Educación</option>
<option value="salud">Salud</option>
<option value="spb">SPB</option>
</select>

<label>Monto</label>
<select name="monto">
{% for i in range(100000, 2000001, 100000) %}
<option value="{{ i }}">
$ {{ "{:,}".format(i).replace(",", ".") }}
</option>
{% endfor %}
</select>

<label>Cuotas</label>
<select name="cuotas">
<option value="12">12 cuotas</option>
<option value="24">24 cuotas</option>
</select>

<button type="submit">Calcular Oferta</button>

</form>

</div>

</body>
</html>
