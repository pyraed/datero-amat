<!DOCTYPE html>
<html>
<head>

<!-- Título de la página (lo que aparece en la pestaña del navegador) -->
<title>AMAT - Simulador</title>

<!-- Hace que el diseño sea responsive (se adapte a celular) -->
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Importa la fuente "Inter" desde Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* Aplica una transición suave a todos los elementos */
* { transition: all 0.2s ease; }

/* Estilo general del body */
body {
    font-family: 'Inter', sans-serif;
    background: #f5f6fa;
    margin: 0;
}

/* Barra superior amarilla */
.header {
    background: #FFD600;
    padding: 16px;
    text-align: center;
    font-weight: 600;
    font-size: 18px;
}

/* Contenedor principal centrado */
.container {
    max-width: 500px;
    margin: 30px auto;
    background: white;
    padding: 20px;
    border-radius: 14px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.08);
}

/* Título principal */
h2 {
    margin-bottom: 20px;
    text-align: center;
}

/* Labels de los campos */
label {
    font-weight: 600;
    font-size: 14px;
}

/* Estilo de los select */
select {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    margin-bottom: 18px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 16px;
}

/* Botón principal */
button {
    width: 100%;
    padding: 16px;
    border-radius: 10px;
    border: none;
    background: #1a1a1a;
    color: white;
    font-weight: 600;
    font-size: 16px;
}

/* Efecto hover del botón */
button:hover {
    background: #333;
    transform: scale(1.02);
}

</style>
</head>

<body>

<!-- Header superior -->
<div class="header" id="headerEntidad">AMAT - Mutual Amarilla</div>

<!-- Contenedor principal -->
<div class="container">

<!-- Título -->
<h2>Simular Oferta</h2>

<!-- Formulario que envía datos al endpoint /calcular -->
<form id="formulario" method="post">

<label>Entidad</label>
<select name="entidad" id="entidad">
<option value="amat">AMAT</option>
<option value="dos_agosto">2 de Agosto</option>
</select>

<label>Línea</label>
<select name="linea" id="linea">
    <option value="haberes">Haberes</option>
    <option value="bapro">Bapro</option>
    <option value="ayuda">Ayudas Económicas</option>
</select>

<!-- Selector de repartición -->
<label>Repartición</label>
<select name="reparticion" id="reparticion">
<option value="policia">Policía</option>
<option value="educacion">Educación</option>
<option value="salud">Salud</option>
<option value="spb">SPB</option>
</select>

<!-- Selector de monto -->
<div id="bloqueMonto">
    <label>Monto</label>
    <select name="monto">

    <!-- Genera automáticamente opciones desde 100.000 hasta 2.000.000 de 100.000 en 100.000 -->
    {% for i in montos %}
    <option value="{{ i }}">
    $ {{ "{:,}".format(i).replace(",", ".") }}
    </option>
    {% endfor %}

    </select>
</div>

<!-- Selector de cantidad de cuotas -->
<div id="bloqueCuotas">
    <label>Cuotas</label>
    <select name="cuotas">
        <option value="12">12 cuotas</option>
        <option value="18">18 cuotas</option>
        <option value="24">24 cuotas</option>
    </select>
</div>

<!-- Botón para enviar el formulario -->
<button type="submit">Calcular Oferta</button>

</form>

</div>


<script>
const selectEntidad = document.querySelector('select[name="entidad"]');
const header = document.getElementById("headerEntidad");

selectEntidad.addEventListener("change", function() {
    if (this.value === "dos_agosto") {
        header.innerText = "Mutual 2 de Agosto";
        header.style.background = "#2C2C2C"; // gris
    } else {
        header.innerText = "AMAT - Mutual Amarilla";
        header.style.background = "#FFD600";
    }
});



</script>
</script>

<script>
const form = document.getElementById("formulario");
const entidadSelect = document.querySelector('select[name="entidad"]');

form.addEventListener("submit", function(e) {
    const entidad = entidadSelect.value;

    if (entidad === "dos_agosto") {
        form.action = "/calcular?ent=dos_agosto";
    } else {
        form.action = "/calcular?ent=amat";
    }
});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const lineaSelect = document.getElementById("linea");
    const reparticionSelect = document.getElementById("reparticion");
    const bloqueMonto = document.getElementById("bloqueMonto");
    const bloqueCuotas = document.getElementById("bloqueCuotas");
    const montoSelect = document.querySelector('select[name="monto"]');
    const entidadSelect = document.getElementById("entidad"); // 👈 NUEVO

    const opcionesReparticionOriginal = reparticionSelect.innerHTML;
    const opcionesMontoOriginal = montoSelect.innerHTML;
    const opcionesLineaOriginal = lineaSelect.innerHTML; // 👈 NUEVO

    // 👇 BLOQUE EXISTENTE + FIX
    entidadSelect.addEventListener("change", function () {
        const entidad = this.value;

        if (entidad === "dos_agosto") {
            lineaSelect.innerHTML = `
                <option value="haberes">Haberes</option>
                <option value="ayuda">Ayudas Económicas</option>
            `;

            // 🔥 FIX: si venía de BAPRO, forzar HABERES y reconstruir todo
            lineaSelect.value = "haberes";
            lineaSelect.dispatchEvent(new Event("change"));

        } else {
            lineaSelect.innerHTML = opcionesLineaOriginal;

            // 🔥 FIX: reconstruir UI también al volver a AMAT
            lineaSelect.dispatchEvent(new Event("change"));
        }
    });

    lineaSelect.addEventListener("change", function () {
        const linea = this.value;

        // 🔵 AYUDA
        if (linea === "ayuda") {

            reparticionSelect.innerHTML = `
                <option value="educacion">Educación</option>
                <option value="salud">Salud</option>
            `;

            bloqueMonto.style.display = "none";
            bloqueCuotas.style.display = "none";
        }

        // 🟡 BAPRO
        else if (linea === "bapro") {

            // Reparticiones (agregamos nuevas)
            reparticionSelect.innerHTML = `
                ${opcionesReparticionOriginal}
                <option value="caja_policia">Caja de Policía</option>
                <option value="ips">IPS</option>
            `;

            // Mostrar monto pero cambiar opciones
            bloqueMonto.style.display = "block";
            bloqueCuotas.style.display = "none";

            montoSelect.innerHTML = `
                <option value="100000">$ 100.000</option>
                <option value="150000">$ 150.000</option>
                <option value="200000">$ 200.000</option>
                <option value="250000">$ 250.000</option>
                <option value="300000">$ 300.000</option>
            `;
        }

        // 🟢 HABERES
        else {

            reparticionSelect.innerHTML = opcionesReparticionOriginal;

            bloqueMonto.style.display = "block";
            bloqueCuotas.style.display = "block";

            montoSelect.innerHTML = opcionesMontoOriginal;
        }
    });

});
</script>

</body>
</html>
