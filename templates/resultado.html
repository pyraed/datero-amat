<!DOCTYPE html>
<html>
<head>
<title>Oferta</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

<style>
* {
    transition: all 0.2s ease;
}

body {
    font-family: 'Inter', Arial;
    background: #f5f6fa;
    margin: 0;
}

.card {
    max-width: 500px;
    margin: 40px auto;
    background: white;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0px 10px 30px rgba(0,0,0,0.08);
}

.header {
    background: #FFD600;
    padding: 12px;
    font-weight: 600;
    border-radius: 8px;
    margin-bottom: 20px;
    text-align: center;
}

.item {
    display: flex;
    justify-content: space-between;
    margin: 10px 0;
    font-size: 15px;
}

.item b {
    color: #333;
}

.box {
    background: #f1f3f6;
    padding: 15px;
    border-radius: 10px;
    margin-top: 20px;
}

.box b {
    display: block;
    margin-bottom: 10px;
}

.link-container {
    margin-top: 20px;
}

input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ddd;
    font-size: 14px;
}

button {
    width: 100%;
    margin-top: 10px;
    padding: 12px;
    background: #1a1a1a;
    color: white;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
}

button:hover {
    background: #333;
    transform: scale(1.02);
}
</style>
</head>

<body>

<div class="card">

<div class="header">Detalle de la Oferta</div>

<div class="item"><b>Repartición:</b> {{ reparticion }}</div>
<div class="item"><b>Monto:</b> {{ monto }}</div>
<div class="item"><b>Cuotas:</b> {{ cuotas }}</div>
<div class="item"><b>Valor Cuota:</b> {{ valor_cuota }}</div>

<div class="box">
<b>Membresía</b>
<div class="item">Cuota Social: {{ cuota_social }}</div>
<div class="item">Coseguro Médico: {{ medico }}</div>
<div class="item">Coseguro Farmacia: {{ farmacia }}</div>
</div>

<div class="link-container">
<h4>Link para enviar</h4>

<input id="linkInput" value="{{ link }}" readonly>

<button onclick="copiarLink()">Copiar Link</button>
</div>

</div>

<script>
function copiarLink() {
    var copyText = document.getElementById("linkInput");
    copyText.select();
    document.execCommand("copy");

    alert("Link copiado correctamente ✅");
}
</script>

</body>
</html>
